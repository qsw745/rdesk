name: rdesk
description: Cross-platform remote desktop control application.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.9.0
  provider: ^6.1.1
  go_router: ^14.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0
  flutter_local_notifications: ^17.0.0
  cupertino_icons: ^1.0.6
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets: []

  fonts: []
